<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Cart Tracker">
    <meta name="theme-color" content="#007bff">
    <meta name="format-detection" content="telephone=no">
    <title>Cart & Parking Tracker</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="view-carts">
    <div class="container">
        <header class="app-header">
            <h1>Cart & Parking Tracker</h1>
        </header>

        <nav class="view-toggle" aria-label="Switch between carts and parking">
            <button type="button" class="toggle-btn active" data-view="carts" aria-pressed="true">
                <span class="toggle-icon" aria-hidden="true">&#x1F6D2;</span>
                Carts
            </button>
            <button type="button" class="toggle-btn" data-view="parking" aria-pressed="false">
                <span class="toggle-icon" aria-hidden="true">&#x1F697;</span>
                Parking
            </button>
        </nav>

        <div class="forms-container">
            <section class="checkout-form view-panel" id="cartForm" aria-labelledby="cartFormTitle">
                <h2 id="cartFormTitle">Check Out Cart</h2>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label for="staffCode">Staff code <span class="label-hint">(optional — sync across shifts)</span></label>
                        <div class="staff-code-input">
                            <input type="text" id="staffCode" placeholder="Leave blank for local-only mode" autocomplete="off" spellcheck="false">
                            <button type="button" id="connectBtn" class="connect-btn hidden">Connect</button>
                        </div>
                    </div>
                    <div class="sync-status" id="syncStatus">
                        <span class="status-indicator local">Local mode</span>
                    </div>
                    <div class="form-group">
                        <label for="cartNumber">Cart number</label>
                        <input type="text" id="cartNumber" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="studentId">Student ID</label>
                        <input type="text" id="studentId" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Phone number</label>
                        <input type="tel" id="phoneNumber" required autocomplete="tel">
                    </div>
                    <button type="submit" class="submit-btn">Check out cart</button>
                </form>
            </section>

            <section class="checkout-form view-panel" id="parkingForm" aria-labelledby="parkingFormTitle">
                <h2 id="parkingFormTitle">Issue parking permit</h2>
                <form id="parkingFormElement">
                    <div class="form-group">
                        <label for="licensePlate">License plate</label>
                        <input type="text" id="licensePlate" required autocomplete="off" autocapitalize="characters">
                    </div>
                    <div class="form-group">
                        <label for="parkingPhone">Phone number</label>
                        <input type="tel" id="parkingPhone" required autocomplete="tel">
                    </div>
                    <button type="submit" class="submit-btn">Issue permit</button>
                </form>
            </section>
        </div>

        <section class="checked-out-carts view-panel" id="cartsSection" aria-labelledby="cartsListTitle">
            <h2 id="cartsListTitle">Checked out carts</h2>
            <div id="cartsList" class="items-list" aria-live="polite"></div>
        </section>

        <section class="checked-out-carts view-panel" id="parkingSection" aria-labelledby="parkingListTitle">
            <h2 id="parkingListTitle">Active parking permits</h2>
            <div id="parkingList" class="items-list" aria-live="polite"></div>
        </section>

        <div class="alerts" id="alerts" aria-live="assertive"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { firebaseConfig, isFirebaseConfigured } from './firebase-config.js';

        window.isFirebaseConfigured = isFirebaseConfigured();

        if (window.isFirebaseConfigured) {
            window.firebaseApp = initializeApp(firebaseConfig);
            window.firebaseDb = getFirestore(window.firebaseApp);
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.cartTracker = new CartTracker();
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
